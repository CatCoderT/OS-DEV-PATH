<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Learn x86_64 assembly from scratch to build your own OS. Free tutorial covering registers, bootloader, interrupts and more.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OS Dev Path</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Space+Grotesk:wght@300;400;600;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --bg2: #0f0f1a;
    --accent: #7fff7f;
    --dim: #444466;
    --text: #ccd6f6;
    --text-dim: #8892b0;
    --border: #1e1e30;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 48px;
    border-bottom: 1px solid var(--border);
  }

  .nav-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    text-decoration: none;
  }

  .nav-links {
    display: flex;
    gap: 8px;
  }

  .nav-links a {
    padding: 8px 18px;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    transition: all 0.15s;
  }

  .nav-links a:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .nav-links a.primary {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 700;
  }

  .nav-links a.primary:hover {
    background: white;
    border-color: white;
    color: var(--bg);
  }

  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 48px;
    max-width: 800px;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  h1 {
    font-size: clamp(48px, 7vw, 88px);
    font-weight: 700;
    color: white;
    line-height: 1.0;
    letter-spacing: -2px;
    margin-bottom: 28px;
  }

  h1 span { color: var(--accent); }

  p {
    font-size: 17px;
    color: var(--text-dim);
    max-width: 480px;
    line-height: 1.7;
    margin-bottom: 48px;
  }

  .cta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    padding: 13px 26px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.15s;
    font-family: 'Space Grotesk', sans-serif;
  }

  .btn-green {
    background: var(--accent);
    color: var(--bg);
  }

  .btn-green:hover { background: white; transform: translateY(-1px); }

  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-1px);
  }

  @media (max-width: 600px) {
    nav { padding: 20px 24px; }
    .hero { padding: 60px 24px; }
    h1 { font-size: 42px; }
    .nav-links a:not(.primary) { display: none; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-title" href="#">OS Dev Path</a>
  <div class="nav-links">
    <a href="c-tutorial.html">C</a>
    <a href="asm.html">ASM</a>
    <a href="c-tutorial.html" class="primary">Start →</a>
    <a class="nav-title" href="https://wiki.osdev.org/" target="_blank">
      OsDev.org ➹
    </a>
  </div>
</nav>

<section class="hero">
  <div class="eyebrow">Free — For Everyone</div>
  <h1>Build your<br>own <span>OS.</span></h1>
  <p>A no-fluff path from zero to a real operating system. Start with C, add ASM, own the machine.</p>
  <div class="cta">
    <a href="c-tutorial.html" class="btn btn-green">Start with C →</a>
    <a href="asm.html" class="btn btn-ghost">Jump to ASM</a>
  </div>
</section>

</body>
</html>
